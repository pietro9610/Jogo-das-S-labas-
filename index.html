<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÍLABAS DOS HERÓIS</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --theme-color: #FF8C00; /* Cor base que vai mudar */
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#2d2d44 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* Barra de Progresso */
        .progress-container {
            width: 90%;
            max-width: 450px;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid white;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #77dd77;
            transition: width 0.5s ease;
        }

        .score-board {
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
        }

        #game-container {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 8px solid var(--theme-color);
            color: #333;
            transition: border-color 0.5s;
        }

        .hero-banner {
            font-size: 16px;
            font-weight: bold;
            background: var(--theme-color);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 10px;
            transition: background-color 0.5s;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
        }

        .emoji-display {
            font-size: 90px;
            margin: 10px 0;
            display: block;
            filter: drop-shadow(2px 2px 0px #ccc);
        }

        .word-display {
            font-size: 45px;
            letter-spacing: 5px;
            margin: 20px 0;
            font-weight: 900;
        }

        .missing-syllable {
            color: var(--theme-color);
            text-decoration: underline;
            min-width: 50px;
            display: inline-block;
            transition: color 0.5s;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        button.option-btn {
            padding: 18px;
            font-size: 28px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background-color: #3b5bdb;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px #263d8f;
            transition: transform 0.1s;
        }

        button.option-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .audio-btn {
            background-color: #FFD700;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px #b8a500;
            cursor: pointer;
        }

        .audio-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        #message {
            height: 30px;
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        /* Animações */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .shake { animation: shake 0.4s; }
        .pop { animation: pop 0.4s; }

    </style>
</head>
<body>

<div class="score-board">PONTOS: <span id="points">0</span></div>

<div class="progress-container">
    <div class="progress-bar" id="xp-bar"></div>
</div>

<div id="game-container">
    <div class="hero-banner" id="hero-msg">ESQUADRÃO DE ELITE!</div>
    <span id="emoji" class="emoji-display"></span>
    
    <button class="audio-btn" onclick="ouvirPalavra()">🔊 OUVIR MISSÃO</button>
    
    <div id="word" class="word-display"></div>
    <div id="options" class="options-container"></div>
    <div id="message"></div>
</div>

<script>
    // Banco de palavras expandido
    const listaPalavras = [
        { s: ["BO", "LA"], e: "⚽", n: "BOLA" },
        { s: ["CA", "SA"], e: "🏠", n: "CASA" },
        { s: ["GA", "TO"], e: "🐱", n: "GATO" },
        { s: ["MA", "CA", "CO"], e: "🐒", n: "MACACO" },
        { s: ["PI", "PO", "CA"], e: "🍿", n: "PIPOCA" },
        { s: ["CA", "VA", "LO"], e: "🐎", n: "CAVALO" },
        { s: ["JA", "CA", "RÉ"], e: "🐊", n: "JACARÉ" },
        { s: ["BA", "NA", "NA"], e: "🍌", n: "BANANA" },
        { s: ["FO", "GO"], e: "🔥", n: "FOGO" },
        { s: ["DA", "DO"], e: "🎲", n: "DADO" },
        { s: ["SA", "PA", "TO"], e: "👞", n: "SAPATO" },
        { s: ["CO", "RU", "JA"], e: "🦉", n: "CORUJA" },
        { s: ["BO", "NE", "CA"], e: "🪆", n: "BONECA" },
        { s: ["U", "VA"], e: "🍇", n: "UVA" },
        { s: ["PI", "ÃO"], e: "🪁", n: "PIÃO" }
    ];

    // Heróis e suas cores
    const herois = [
        { frase: "GOKU: KAMEHAMEHAAAA! ☄️", cor: "#FF8C00" }, // Laranja
        { frase: "NARUTO: TÔ CERTO! 🍜", cor: "#FCE300" }, // Amarelo
        { frase: "SPIDEY: LANÇANDO TEIA! 🕸️", cor: "#ED1D24" }, // Vermelho
        { frase: "DEADPOOL: ESSA FOI FÁCIL! ⚔️", cor: "#8B0000" }, // Vermelho Escuro
        { frase: "SUPER-CHOQUE: TÁ CARREGADO! ⚡", cor: "#00BFFF" } // Azul Claro
    ];

    let atual = {};
    let indexOculto = 0;
    let pontos = 0;
    let xp = 0;

    function iniciar() {
        // Limpar visual
        document.getElementById('message').innerText = "";
        document.getElementById('options').innerHTML = "";
        document.getElementById('hero-msg').innerText = "VAMOS LÁ, HERÓI!";
        document.documentElement.style.setProperty('--theme-color', '#3b5bdb'); // Cor neutra no início
        document.getElementById('game-container').classList.remove('pop', 'shake');
        
        // Sortear palavra e sílaba
        atual = listaPalavras[Math.floor(Math.random() * listaPalavras.length)];
        indexOculto = Math.floor(Math.random() * atual.s.length);
        
        // Atualizar tela
        document.getElementById('emoji').innerText = atual.e;
        document.getElementById('word').innerHTML = atual.s.map((silaba, i) => 
            i === indexOculto ? '<span class="missing-syllable">___</span>' : silaba
        ).join("");

        gerarOpcoes(atual.s[indexOculto]);
    }

    function gerarOpcoes(correta) {
        let opts = [correta];
        let extras = ["PA", "ME", "TI", "BO", "CO", "RE", "VA", "DU", "LA", "SA", "NA", "TO"];
        
        while(opts.length < 4) {
            let r = extras[Math.floor(Math.random() * extras.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        
        // Embaralhar as 4 opções
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => verificarResposta(opt, correta, btn);
            document.getElementById('options').appendChild(btn);
        });
    }

    function verificarResposta(escolhida, correta, btn) {
        // Impedir cliques múltiplos
        if (document.getElementById('message').innerText !== "") return;

        const container = document.getElementById('game-container');

        if(escolhida === correta) {
            // ACERTOU
            btn.style.backgroundColor = "#77dd77";
            pontos += 10;
            xp += 10;
            if (xp > 100) xp = 0; // Reseta a barra se chegar a 100%
            
            document.getElementById('points').innerText = pontos;
            document.getElementById('xp-bar').style.width = xp + "%";
            document.getElementById('message').innerText = "ACERTOU EM CHEIO!";
            document.getElementById('message').style.color = "#77dd77";
            
            // Sortear herói para comemorar
            let heroiSorteado = herois[Math.floor(Math.random() * herois.length)];
            document.getElementById('hero-msg').innerText = heroiSorteado.frase;
            document.documentElement.style.setProperty('--theme-color', heroiSorteado.cor);
            
            falar(atual.n);
            document.getElementById('word').innerHTML = atual.s.join("");
            container.classList.add('pop'); // Animação de pulo
            
            setTimeout(iniciar, 2500); // Aguarda 2.5s para a próxima
        } else {
            // ERROU
            btn.style.backgroundColor = "#ff6961";
            document.getElementById('message').innerText = "TENTE DE NOVO!";
            document.getElementById('message').style.color = "#ff6961";
            
            falar("Tente de novo");
            container.classList.add('shake'); // Animação de tremer
            
            // Remove a tremedeira depois de um tempo para poder tremer de novo se errar
            setTimeout(() => {
                container.classList.remove('shake');
                document.getElementById('message').innerText = "";
                btn.style.backgroundColor = "#3b5bdb"; // Volta a cor original
            }, 1000);
        }
    }

    function falar(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'pt-BR';
        u.rate = 0.9; // Um pouquinho mais devagar para a criança entender bem
        window.speechSynthesis.speak(u);
    }

    function ouvirPalavra() {
        falar("COMPLETE A PALAVRA: " + atual.n);
    }

    // Iniciar o jogo na primeira vez
    iniciar();
</script>
</body>
</html>
