<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO ALFABETIZAÇÃO: HERÓIS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #ffffff;
            --primary: #3b82f6;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#1e293b 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            text-transform: uppercase;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 90%;
            max-width: 500px;
            height: 12px;
            background: #334155;
            border-radius: 10px;
            border: 2px solid #fff;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #10b981;
            transition: width 0.3s;
        }

        #game-card {
            background: var(--card);
            color: #1e293b;
            padding: 25px;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid var(--primary);
            transition: transform 0.2s, border-color 0.5s;
        }

        .hero-tag {
            background: #1e293b;
            color: #fff;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .emoji-box {
            font-size: 100px;
            margin: 10px 0;
            display: block;
        }

        .word-display {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 6px;
            margin: 20px 0;
            min-height: 60px;
        }

        .blank {
            color: #ef4444;
            border-bottom: 6px solid #ef4444;
            display: inline-block;
            min-width: 60px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-opt {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 20px;
            font-size: 30px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1d4ed8;
            transition: 0.1s;
        }

        .btn-opt:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        .audio-btn {
            background: #f59e0b;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b45309;
        }

        #feedback {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            height: 25px;
        }

        /* Animações */
        @keyframes correct { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes wrong { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .anim-correct { animation: correct 0.4s; border-color: #10b981 !important; }
        .anim-wrong { animation: wrong 0.4s; border-color: #ef4444 !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <span>⭐ PONTOS: <span id="pt">0</span></span>
            <span>🏆 NÍVEL: <span id="lv">1</span></span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="pb"></div>
        </div>
    </div>

    <div id="game-card">
        <div class="hero-tag" id="htag">INICIANDO MISSÃO...</div>
        <span class="emoji-box" id="emj"></span>
        <button class="audio-btn" onclick="ouvir()">🔊 OUVIR PALAVRA</button>
        <div class="word-display" id="wrd"></div>
        <div class="options-grid" id="opts"></div>
        <div id="feedback"></div>
    </div>

<script>
    // MEGA BANCO DE DADOS (100+ Palavras)
    const bancoOriginal = [
        {s:["BO","LA"], e:"⚽", n:"BOLA"}, {s:["CA","SA"], e:"🏠", n:"CASA"}, {s:["GA","TO"], e:"🐱", n:"GATO"},
        {s:["MA","LA"], e:"🧳", n:"MALA"}, {s:["PA","TO"], e:"🦆", n:"PATO"}, {s:["SA","PO"], e:"🐸", n:"SAPO"},
        {s:["VA","CA"], e:"🐮", n:"VACA"}, {s:["DA","DO"], e:"🎲", n:"DADO"}, {s:["FO","CA"], e:"🦭", n:"FOCA"},
        {s:["LU","VA"], e:"🧤", n:"LUVA"}, {s:["PI","PO","CA"], e:"🍿", n:"PIPOCA"}, {s:["CA","VA","LO"], e:"🐎", n:"CAVALO"},
        {s:["JA","CA","RÉ"], e:"🐊", n:"JACARÉ"}, {s:["MA","CA","CO"], e:"🐒", n:"MACACO"}, {s:["PA","NE","LA"], e:"🍳", n:"PANELA"},
        {s:["BO","NE","CA"], e:"🪆", n:"BONECA"}, {s:["BA","NA","NA"], e:"🍌", n:"BANANA"}, {s:["GI","RA","FA"], e:"🦒", n:"GIRAFA"},
        {s:["SA","PA","TO"], e:"👞", n:"SAPATO"}, {s:["TO","MA","TE"], e:"🍅", n:"TOMATE"}, {s:["BU","LE"], e:"☕", n:"BULE"},
        {s:["FO","GO"], e:"🔥", n:"FOGO"}, {s:["GE","LO"], e:"🧊", n:"GELO"}, {s:["RA","TO"], e:"🐭", n:"RATO"},
        {s:["SU","CO"], e:"🧃", n:"SUCO"}, {s:["CO","PO"], e:"🥤", n:"COPO"}, {s:["ME","SA"], e:"🪑", n:"MESA"},
        {s:["BO","LO"], e:"🎂", n:"BOLO"}, {s:["PE","IXE"], e:"🐟", n:"PEIXE"}, {s:["RE","DE"], e:"🕸️", n:"REDE"},
        {s:["LO","BO"], e:"🐺", n:"LOBO"}, {s:["U","VA"], e:"🍇", n:"UVA"}, {s:["PI","ÃO"], e:"🪁", n:"PIÃO"},
        {s:["BA","LÃO"], e:"🎈", n:"BALÃO"}, {s:["I","GRE","JA"], e:"⛪", n:"IGREJA"}, {s:["E","SCA","DA"], e:"🪜", n:"ESCADA"},
        {s:["A","BA","CA","XI"], e:"🍍", n:"ABACAXI"}, {s:["ME","LAN","CI","A"], e:"🍉", n:"MELANCIA"}, {s:["CO","RU","JA"], e:"🦉", n:"CORUJA"},
        {s:["BU","RI","TI"], e:"🌴", n:"BURITI"}, {s:["PI","A","NO"], e:"🎹", n:"PIANO"}, {s:["GA","I","OLA"], e:"🦜", n:"GAIOLA"},
        {s:["JA","NE","LA"], e:"🪟", n:"JANELA"}, {s:["FI","VE","LA"], e:"ベルト", n:"FIVELA"}, {s:["CA","ME","LO"], e:"🐪", n:"CAMELO"},
        {s:["BO","TA"], e:"🥾", n:"BOTA"}, {s:["BA","TA","TA"], e:"🥔", n:"BATATA"}, {s:["CA","RE","TA"], e:"😜", n:"CARETA"},
        {s:["MO","E","DA"], e:"🪙", n:"MOEDA"}, {s:["NA","VI","O"], e:"🚢", n:"NAVIO"}, {s:["NO","VE"], e:"9️⃣", n:"NOVE"},
        {s:["O","VO"], e:"🥚", n:"OVO"}, {s:["PA","PA","I"], e:"👨", n:"PAPAI"}, {s:["PI","PA"], e:"🪁", n:"PIPA"},
        {s:["RO","DA"], e:"🛞", n:"RODA"}, {s:["TA","TU"], e:"🦦", n:"TATU"}, {s:["UR","SO"], e:"🐻", n:"URSO"},
        {s:["ZE","BRA"], e:"🦓", n:"ZEBRA"}, {s:["BU","RO"], e:"🫏", n:"BURRO"}, {s:["CA","JU"], e:"🥥", n:"CAJU"},
        {s:["DO","CE"], e:"🍬", n:"DOCE"}, {s:["FA","CA"], e:"🔪", n:"FACA"}, {s:["GU","GA"], e:"🎾", n:"GUGA"},
        {s:["HO","JE"], e:"📅", n:"HOJE"}, {s:["JO","GO"], e:"🎮", n:"JOGO"}, {s:["KA","TE"], e:"🥋", n:"KARATE"},
        {s:["LE","TE"], e:"🥛", n:"LEITE"}, {s:["MU","RO"], e:"🧱", n:"MURO"}, {s:["NA","RIZ"], e:"👃", n:"NARIZ"},
        {s:["PI","PO","CA"], e:"🍿", n:"PIPOCA"}, {s:["RE","I"], e:"👑", n:"REI"}, {s:["SO","PA"], e:"🥣", n:"SOPA"},
        {s:["TE","LA"], e:"📺", n:"TELA"}, {s:["VA","SO"], e:"🪴", n:"VASO"}, {s:["XÍ","CA","RA"], e:"☕", n:"XÍCARA"},
        {s:["CO","LA"], e:"🧴", n:"COLA"}, {s:["FE","IJÃO"], e:"🫘", n:"FEIJÃO"}, {s:["LU","A"], e:"🌙", n:"LUA"},
        {s:["ME","IA"], e:"🧦", n:"MEIA"}, {s:["PI","NO"], e:"🎳", n:"PINO"}, {s:["RA","IO"], e:"⚡", n:"RAIO"}
    ];

    const herois = [
        {f:"GOKU: KAMEHAMEHAAAA! ☄️", c:"#FF8C00"},
        {f:"NARUTO: TÔ CERTO! 🍜", c:"#FCE300"},
        {f:"SPIDEY: TEIA LANÇADA! 🕸️", c:"#ED1D24"},
        {f:"SUPER-CHOQUE: CHOQUE NELES! ⚡", c:"#00BFFF"},
        {f:"DEADPOOL: MANDOU BEM! ⚔️", c:"#9b2226"}
    ];

    let palavrasFila = [];
    let atual = {};
    let pts = 0;
    let idxOculto = 0;

    function embaralhar(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function novaRodada() {
        if (palavrasFila.length === 0) {
            palavrasFila = [...bancoOriginal];
            embaralhar(palavrasFila);
        }

        const card = document.getElementById('game-card');
        card.className = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('opts').innerHTML = "";

        atual = palavrasFila.pop(); // Tira uma palavra da fila para nunca repetir
        idxOculto = Math.floor(Math.random() * atual.s.length);

        document.getElementById('emj').innerText = atual.e;
        document.getElementById('wrd').innerHTML = atual.s.map((s, i) => 
            i === idxOculto ? '<span class="blank">?</span>' : s
        ).join("");

        const corretas = [atual.s[idxOculto]];
        const extras = ["MA","TE","RI","BO","CO","RE","VA","NA","LU","PA","DA","SI"];
        while(corretas.length < 4) {
            let r = extras[Math.floor(Math.random() * extras.length)];
            if(!corretas.includes(r)) corretas.push(r);
        }
        embaralhar(corretas);

        corretas.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = opt;
            btn.onclick = () => validar(opt, btn);
            document.getElementById('opts').appendChild(btn);
        });
    }

    function validar(escolha, btn) {
        const card = document.getElementById('game-card');
        if (escolha === atual.s[idxOculto]) {
            pts += 10;
            document.getElementById('pt').innerText = pts;
            document.getElementById('lv').innerText = Math.floor(pts/100) + 1;
            document.getElementById('pb').style.width = (pts % 100) + "%";
            
            const h = herois[Math.floor(Math.random() * herois.length)];
            document.getElementById('htag').innerText = h.f;
            document.documentElement.style.setProperty('--primary', h.c);
            
            card.classList.add('anim-correct');
            document.getElementById('feedback').innerText = "INCRÍVEL! 🚀";
            document.getElementById('wrd').innerText = atual.s.join("");
            falar(atual.n);
            setTimeout(novaRodada, 2000);
        } else {
            card.classList.add('anim-wrong');
            document.getElementById('feedback').innerText = "TENTE NOVAMENTE! 🛡️";
            falar("Ops");
            setTimeout(() => card.classList.remove('anim-wrong'), 500);
        }
    }

    function falar(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'pt-BR';
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    function ouvir() {
        falar("COMPLETE A PALAVRA " + atual.n);
    }

    novaRodada();
</script>
</body>
</html>
